  connectivity_plus: ^7.1.1
  flutter_svg: ^2.0.9
  http: ^1.3.0
  lottie: ^3.3.1
  image_picker: ^1.1.2
  qr_flutter: ^4.1.0
  shimmer: ^3.0.0
  flutter_fortune_wheel: ^1.3.0
  flutter_widget_from_html: ^0.17.2
  pinput: ^6.0.2
  flutter_timer_countdown: ^1.0.7
  mobile_scanner: ^7.2.0
  flutter_launcher_icons: ^0.14.3
  carousel_slider: ^5.0.0
  smooth_page_indicator: ^2.0.1
