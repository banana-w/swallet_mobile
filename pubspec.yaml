dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  intl: 0.20.2
  timeline_tile: ^2.0.0
  google_fonts: ^8.1.0
  flutter_bloc: ^9.1.0
  awesome_snackbar_content: ^0.1.3
  hive_flutter: ^1.1.0
  equatable: ^2.0.7
